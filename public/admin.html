<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Jovem - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 64, 175, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .ticket-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .ticket-item {
            background: #f8fafc;
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
        }

        .ticket-item:hover {
            border-color: #3b82f6;
        }

        .ticket-item.pending {
            border-color: #f59e0b;
            background: #fef3c7;
        }

        .ticket-item.paid {
            border-color: #10b981;
            background: #d1fae5;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .ticket-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .status-pending {
            background: #fed7aa;
            color: #c2410c;
        }

        .status-paid {
            background: #bbf7d0;
            color: #065f46;
        }

        .ticket-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .detail-label {
            font-weight: 600;
            color: #64748b;
            font-size: 14px;
        }

        .detail-value {
            font-size: 16px;
            color: #1e293b;
        }

        .pix-info {
            background: #dbeafe;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 14px;
            color: #1e40af;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .hidden { display: none; }
        
        @media (max-width: 768px) {
            .ticket-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .ticket-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Copa Jovem - Painel Admin</h1>
            <p>Confirmação de Pagamentos PIX</p>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px; color: #1e40af;">📊 Resumo</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                <div style="text-align: center; background: #f8fafc; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 2em; font-weight: 900; color: #f59e0b;" id="pendingCount">0</div>
                    <div style="color: #64748b; font-weight: 500;">Pendentes</div>
                </div>
                <div style="text-align: center; background: #f8fafc; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 2em; font-weight: 900; color: #10b981;" id="paidCount">0</div>
                    <div style="color: #64748b; font-weight: 500;">Confirmados</div>
                </div>
                <div style="text-align: center; background: #f8fafc; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 2em; font-weight: 900; color: #1e40af;" id="totalRevenue">R$ 0</div>
                    <div style="color: #64748b; font-weight: 500;">Receita</div>
                </div>
            </div>
            <button class="btn" onclick="loadTickets()">🔄 Atualizar</button>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px; color: #1e40af;">💳 Pagamentos Pendentes</h3>
            <div class="ticket-list" id="ticketList">
                <div style="text-align: center; padding: 40px; color: #64748b;">
                    Carregando...
                </div>
            </div>
        </div>
    </div>

    <script>
        let tickets = [];

        // Carregar tickets
        async function loadTickets() {
            try {
                const response = await fetch('/api/admin/tickets');
                const data = await response.json();
                
                tickets = data.tickets || [];
                
                // Atualizar resumo
                const pending = tickets.filter(t => t.status === 'pending');
                const paid = tickets.filter(t => t.status === 'paid');
                
                document.getElementById('pendingCount').textContent = pending.length;
                document.getElementById('paidCount').textContent = paid.length;
                document.getElementById('totalRevenue').textContent = `R$ ${(paid.length * 15).toFixed(2)}`;
                
                // Mostrar tickets pendentes
                renderTickets(pending);
                
            } catch (error) {
                console.error('Erro ao carregar tickets:', error);
                document.getElementById('ticketList').innerHTML = 
                    '<div style="text-align: center; padding: 40px; color: #ef4444;">Erro ao carregar dados</div>';
            }
        }

        // Renderizar tickets
        function renderTickets(ticketsToRender) {
            const container = document.getElementById('ticketList');
            
            if (ticketsToRender.length === 0) {
                container.innerHTML = 
                    '<div style="text-align: center; padding: 40px; color: #64748b;">✅ Nenhum pagamento pendente</div>';
                return;
            }
            
            container.innerHTML = ticketsToRender.map(ticket => `
                <div class="ticket-item ${ticket.status}" id="ticket-${ticket.ticketId}">
                    <div class="ticket-header">
                        <div>
                            <h4 style="color: #1e40af; margin-bottom: 5px;">${ticket.customerName}</h4>
                            <div style="color: #64748b; font-size: 14px;">ID: ${ticket.ticketId}</div>
                        </div>
                        <div class="ticket-status status-${ticket.status}">
                            ${ticket.status === 'pending' ? '⏳ PENDENTE' : '✅ PAGO'}
                        </div>
                    </div>
                    
                    <div class="ticket-details">
                        <div class="detail-item">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${ticket.customerEmail}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">WhatsApp</div>
                            <div class="detail-value">${ticket.customerPhone}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Valor</div>
                            <div class="detail-value">R$ ${ticket.amount.toFixed(2)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Data</div>
                            <div class="detail-value">${new Date(ticket.createdAt).toLocaleString('pt-BR')}</div>
                        </div>
                    </div>
                    
                    ${ticket.status === 'pending' ? `
                        <div style="background: #fff7ed; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #fed7aa;">
                            <div style="font-weight: 600; color: #c2410c; margin-bottom: 10px;">
                                💰 PIX gerado - Aguardando confirmação
                            </div>
                            <div style="font-size: 14px; color: #9a3412; margin-bottom: 15px;">
                                Chave PIX: 62999646263 (João Pedro Zendron)
                            </div>
                            <input type="text" placeholder="ID da transação (opcional)" id="txId-${ticket.ticketId}">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <button class="btn btn-success" onclick="confirmPayment('${ticket.ticketId}')">
                                    ✅ Confirmar Pagamento
                                </button>
                                <button class="btn btn-danger" onclick="cancelPayment('${ticket.ticketId}')">
                                    ❌ Cancelar
                                </button>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Confirmar pagamento
        async function confirmPayment(ticketId) {
            const txId = document.getElementById(`txId-${ticketId}`).value || 'MANUAL_CONFIRM';
            
            if (!confirm('Confirmar que o pagamento PIX foi recebido?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/confirm-payment/${ticketId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        transactionId: txId,
                        amount: 15.00 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Pagamento confirmado! Ingresso enviado por WhatsApp e Email.');
                    loadTickets(); // Recarregar lista
                } else {
                    alert('❌ Erro ao confirmar pagamento: ' + (result.error || 'Erro desconhecido'));
                }
                
            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao confirmar pagamento');
            }
        }

        // Cancelar pagamento
        async function cancelPayment(ticketId) {
            if (!confirm('Cancelar este pedido?')) {
                return;
            }
            
            // Implementar cancelamento se necessário
            alert('⚠️ Função de cancelamento não implementada ainda');
        }

        // Carregar dados ao iniciar
        document.addEventListener('DOMContentLoaded', loadTickets);
        
        // Auto-atualizar a cada 30 segundos
        setInterval(loadTickets, 30000);
    </script>
</body>
</html>
